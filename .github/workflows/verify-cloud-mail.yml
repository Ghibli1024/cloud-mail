name: Verify cloud-mail setup

on:
  workflow_dispatch:
    inputs:
      zone_name:
        description: Cloudflare zone name
        required: true
        default: ghibli1024.cyou
      email_domain:
        description: Email Routing domain or subdomain
        required: true
        default: edu.ghibli1024.cyou
      target_email:
        description: Cloud Mail address to verify
        required: true
        default: admin@edu.ghibli1024.cyou
      worker_name:
        description: Cloudflare Worker name
        required: true
        default: cloud-mail-ghibli1024

jobs:
  verify:
    name: Verify Cloudflare and D1 state
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
      ZONE_NAME: ${{ inputs.zone_name }}
      EMAIL_DOMAIN: ${{ inputs.email_domain }}
      TARGET_EMAIL: ${{ inputs.target_email }}
      WORKER_NAME: ${{ inputs.worker_name }}

    steps:
      - name: Check required configuration
        run: |
          set -euo pipefail

          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID ZONE_NAME EMAIL_DOMAIN TARGET_EMAIL WORKER_NAME; do
            if [ -z "${!key:-}" ]; then
              echo "::error::${key} is required."
              exit 1
            fi
          done

      - name: Verify public DNS
        run: |
          set -euo pipefail

          ns_records="$(dig +short NS "${ZONE_NAME}" @1.1.1.1 | sort)"
          mx_records="$(dig +short MX "${EMAIL_DOMAIN}" @1.1.1.1 | sort)"
          txt_records="$(dig +short TXT "${EMAIL_DOMAIN}" @1.1.1.1 | sort)"

          echo "NS records for ${ZONE_NAME}:"
          printf '%s\n' "${ns_records}"
          echo "MX records for ${EMAIL_DOMAIN}:"
          printf '%s\n' "${mx_records}"
          echo "TXT records for ${EMAIL_DOMAIN}:"
          printf '%s\n' "${txt_records}"

          mx_count="$(printf '%s\n' "${mx_records}" | grep -c 'mx.cloudflare.net' || true)"
          spf_count="$(printf '%s\n' "${txt_records}" | grep -c '_spf.mx.cloudflare.net' || true)"

          if [ "${mx_count}" -lt 3 ]; then
            echo "::error::Expected three Cloudflare Email Routing MX records for ${EMAIL_DOMAIN}; found ${mx_count}."
            exit 1
          fi

          if [ "${spf_count}" -lt 1 ]; then
            echo "::error::Expected SPF TXT for ${EMAIL_DOMAIN}."
            exit 1
          fi

      - name: Verify Email Routing through Cloudflare API
        run: |
          set -euo pipefail

          API="https://api.cloudflare.com/client/v4"

          zone_response="$(curl -sS -w $'\n%{http_code}' \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/zones?name=${ZONE_NAME}&per_page=1")"
          zone_body="${zone_response%$'\n'*}"
          zone_code="${zone_response##*$'\n'}"

          if [ "${zone_code}" != "200" ]; then
            echo "::warning::Cloudflare token cannot read zone ${ZONE_NAME}; skipped API Email Routing verification. HTTP ${zone_code}."
            jq '{success, errors, messages}' <<< "${zone_body}" || true
            exit 0
          fi

          zone_response="${zone_body}"
          zone_id="$(jq -r '.result[0].id // empty' <<< "${zone_response}")"

          if [ -z "${zone_id}" ]; then
            echo "::warning::Cloudflare zone ${ZONE_NAME} was not returned by the API token; skipped API Email Routing verification."
            exit 0
          fi

          rules_response="$(curl -sS -w $'\n%{http_code}' \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/zones/${zone_id}/email/routing/rules?per_page=100")"
          rules_body="${rules_response%$'\n'*}"
          rules_code="${rules_response##*$'\n'}"

          if [ "${rules_code}" != "200" ]; then
            echo "::warning::Cloudflare token cannot read Email Routing rules; skipped API routing-rule verification. HTTP ${rules_code}."
            jq '{success, errors, messages}' <<< "${rules_body}" || true
            exit 0
          fi

          echo "Routing rules for ${ZONE_NAME}:"
          jq -r '
            .result[]?
            | [
                .name,
                (.matchers // [] | map("\(.type):\(.value)") | join(",")),
                (.actions // [] | map("\(.type):\(.value | join(","))") | join(",")),
                .enabled
              ]
            | @tsv
          ' <<< "${rules_body}"

          exact_worker_rule_count="$(jq --arg target "${TARGET_EMAIL}" --arg worker "${WORKER_NAME}" '
            [
              .result[]?
              | select(.enabled == true)
              | select([.matchers[]? | select(.type == "literal" and (.value | ascii_downcase) == ($target | ascii_downcase))] | length > 0)
              | select([.actions[]? | select(.type == "worker") | .value[]? | select(. == $worker)] | length > 0)
            ] | length
          ' <<< "${rules_body}")"

          if [ "${exact_worker_rule_count}" -ge 1 ]; then
            echo "✅ Exact routing rule sends ${TARGET_EMAIL} to Worker ${WORKER_NAME}."
            exit 0
          fi

          catch_all_response="$(curl -sS -w $'\n%{http_code}' \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/zones/${zone_id}/email/routing/rules/catch_all")"
          catch_all_body="${catch_all_response%$'\n'*}"
          catch_all_code="${catch_all_response##*$'\n'}"

          if [ "${catch_all_code}" != "200" ]; then
            echo "::warning::Cloudflare token cannot read Email Routing catch-all; skipped API catch-all verification. HTTP ${catch_all_code}."
            jq '{success, errors, messages}' <<< "${catch_all_body}" || true
            exit 0
          fi

          catch_all_response="${catch_all_body}"

          echo "Catch-all summary:"
          jq '{enabled: .result.enabled, name: .result.name, matchers: .result.matchers, actions: .result.actions}' <<< "${catch_all_response}"

          worker_target_count="$(jq --arg worker "${WORKER_NAME}" '
            [
              .result.actions[]?
              | select(.type == "worker")
              | .value[]?
              | select(. == $worker)
            ] | length
          ' <<< "${catch_all_response}")"

          if [ "$(jq -r '.result.enabled' <<< "${catch_all_response}")" != "true" ]; then
            echo "::error::No enabled exact route for ${TARGET_EMAIL}, and catch-all rule is not enabled."
            exit 1
          fi

          if [ "${worker_target_count}" -lt 1 ]; then
            echo "::error::No enabled exact route for ${TARGET_EMAIL}, and catch-all rule does not target Worker ${WORKER_NAME}."
            exit 1
          fi

          echo "✅ Catch-all sends unmatched mail to Worker ${WORKER_NAME}."

      - name: Verify D1 account and recent mail
        if: ${{ env.D1_DATABASE_ID != '' }}
        run: |
          set -euo pipefail

          API="https://api.cloudflare.com/client/v4"

          run_sql() {
            local query="$1"
            curl -sS -w $'\n%{http_code}' -X POST \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$(jq -n --arg sql "${query}" '{sql: $sql}')" \
              "${API}/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${D1_DATABASE_ID}/query"
          }

          account_sql="
            SELECT account_id, email, user_id, status, is_del
            FROM account
            WHERE lower(email) = lower('${TARGET_EMAIL}')
            ORDER BY account_id;
          "
          account_response="$(run_sql "${account_sql}")"
          account_body="${account_response%$'\n'*}"
          account_code="${account_response##*$'\n'}"

          if [ "${account_code}" != "200" ]; then
            echo "::warning::Cloudflare token cannot query D1; skipped D1 account/mail verification. HTTP ${account_code}."
            jq '{success, errors, messages}' <<< "${account_body}" || true
            exit 0
          fi

          account_response="${account_body}"

          echo "Account rows for ${TARGET_EMAIL}:"
          jq -r '.result[0].results[]? | [.account_id, .email, .user_id, .status, .is_del] | @tsv' <<< "${account_response}"

          account_count="$(jq '[.result[0].results[]?] | length' <<< "${account_response}")"
          if [ "${account_count}" -lt 1 ]; then
            echo "::warning::No account row exists for ${TARGET_EMAIL}. Create it in Cloud Mail UI before expecting inbox ownership."
          fi

          mail_sql="
            SELECT email_id, to_email, send_email, subject, status, type, user_id, account_id, is_del, create_time
            FROM email
            WHERE lower(to_email) = lower('${TARGET_EMAIL}')
            ORDER BY email_id DESC
            LIMIT 5;
          "
          mail_response="$(run_sql "${mail_sql}")"
          mail_body="${mail_response%$'\n'*}"
          mail_code="${mail_response##*$'\n'}"

          if [ "${mail_code}" != "200" ]; then
            echo "::warning::Cloudflare token cannot query recent D1 mail rows. HTTP ${mail_code}."
            jq '{success, errors, messages}' <<< "${mail_body}" || true
            exit 0
          fi

          mail_response="${mail_body}"

          echo "Recent mail rows for ${TARGET_EMAIL}:"
          jq -r '.result[0].results[]? | [.email_id, .to_email, .send_email, .subject, .status, .type, .user_id, .account_id, .is_del, .create_time] | @tsv' <<< "${mail_response}"

      - name: D1 verification skipped
        if: ${{ env.D1_DATABASE_ID == '' }}
        run: |
          echo "::warning::D1_DATABASE_ID variable is not set; skipped D1 account/mail verification."
