name: 🚀 Deploy cloud-mail to Cloudflare Workers

on:
  push:
    branches: [ main ]
    paths:
      - "mail-worker/**"
      - "mail-vue/**"
  workflow_dispatch:
    inputs:
      setup_email_routing:
        description: 'Configure Cloudflare Email Routing catch-all to the Worker'
        required: false
        default: 'false'
      email_zone_name:
        description: 'Cloudflare zone name for Email Routing'
        required: false
        default: ''
      email_domain:
        description: 'Email Routing domain or subdomain'
        required: false
        default: ''
      setup_custom_domains:
        description: 'Attach CUSTOM_DOMAINS to the Worker through Cloudflare Workers routes'
        required: false
        default: 'false'

jobs:
  Deploy-cloud-mail:
    name: 🏗️ Build and Deploy
    runs-on: ubuntu-latest

    env:
      NAME: ${{ secrets.NAME || vars.NAME || 'cloud-mail' }}
      CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN || vars.CUSTOM_DOMAIN }}
      CUSTOM_DOMAINS: ${{ secrets.CUSTOM_DOMAINS || vars.CUSTOM_DOMAINS || secrets.CUSTOM_DOMAIN || vars.CUSTOM_DOMAIN }}
      DOMAIN: ${{ secrets.DOMAIN || vars.DOMAIN }}
      ADMIN: ${{ secrets.ADMIN || vars.ADMIN }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || vars.JWT_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID || vars.D1_DATABASE_ID }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID || vars.KV_NAMESPACE_ID }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || vars.R2_BUCKET_NAME }}
      PROJECT_LINK: ${{ secrets.PROJECT_LINK || vars.PROJECT_LINK }}
      AI_MODEL: ${{ secrets.AI_MODEL || vars.AI_MODEL || '@cf/meta/llama-3.1-8b-instruct' }}
      CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL || vars.CF_EMAIL || false }}
      ANALYSIS_CACHE: ${{ secrets.ANALYSIS_CACHE || vars.ANALYSIS_CACHE || false }}
      LINUXDO_CLIENT_ID: ${{ secrets.LINUXDO_CLIENT_ID || vars.LINUXDO_CLIENT_ID }}
      LINUXDO_CLIENT_SECRET: ${{ secrets.LINUXDO_CLIENT_SECRET || vars.LINUXDO_CLIENT_SECRET }}
      LINUXDO_CALLBACK_URL: ${{ secrets.LINUXDO_CALLBACK_URL || vars.LINUXDO_CALLBACK_URL }}
      LINUXDO_SWITCH: ${{ secrets.LINUXDO_SWITCH || vars.LINUXDO_SWITCH }}


    outputs:
      worker_url: ${{ steps.deploy.outputs.worker_url }}


    steps:
      - name: 🚚 检出代码仓库 / Checkout repository
        uses: actions/checkout@v4

      - name: 🧭 规范入口域名 / Normalize custom domains
        run: |
          set -euo pipefail

          RAW_CUSTOM_DOMAINS="${CUSTOM_DOMAINS:-${CUSTOM_DOMAIN:-}}"

          if [ -z "${RAW_CUSTOM_DOMAINS}" ]; then
            CUSTOM_DOMAIN_LIST=""
          elif jq -e 'type == "array"' >/dev/null 2>&1 <<< "${RAW_CUSTOM_DOMAINS}"; then
            CUSTOM_DOMAIN_LIST="$(jq -r '.[]' <<< "${RAW_CUSTOM_DOMAINS}")"
          else
            CUSTOM_DOMAIN_LIST="$(printf '%s\n' "${RAW_CUSTOM_DOMAINS}" | tr ',[:space:]' '\n')"
          fi

          CUSTOM_DOMAIN_LIST="$(printf '%s\n' "${CUSTOM_DOMAIN_LIST}" \
            | sed -E 's#^https?://##; s#/.*$##' \
            | sed '/^$/d' \
            | sort -u)"
          FIRST_CUSTOM_DOMAIN="$(printf '%s\n' "${CUSTOM_DOMAIN_LIST}" | sed -n '1p')"

          {
            echo "CUSTOM_DOMAIN_LIST<<EOF"
            printf '%s\n' "${CUSTOM_DOMAIN_LIST}"
            echo "EOF"
            echo "FIRST_CUSTOM_DOMAIN=${FIRST_CUSTOM_DOMAIN}"
          } >> "${GITHUB_ENV}"

          if [ -z "${CUSTOM_DOMAIN_LIST}" ]; then
            echo "::warning:: CUSTOM_DOMAINS variable is not set."
          else
            echo "Custom domains:"
            printf '%s\n' "${CUSTOM_DOMAIN_LIST}"
          fi

      - name: 🧹 清理根域 DNS 冲突 / Clean conflicting apex DNS records
        run: |
          set -euo pipefail
          API="https://api.cloudflare.com/client/v4"

          find_zone_id() {
            local hostname="$1"
            local candidate="${hostname}"

            while [[ "${candidate}" == *.* ]]; do
              local response
              response="$(curl -sS \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                "${API}/zones?name=${candidate}&per_page=1")"

              local zone_id
              zone_id="$(jq -r '.result[0].id // empty' <<< "${response}")"

              if [ -n "${zone_id}" ]; then
                printf '%s\n' "${zone_id}"
                return 0
              fi

              candidate="${candidate#*.}"
            done

            return 1
          }

          if [ -z "${CUSTOM_DOMAIN_LIST}" ]; then
            echo "CUSTOM_DOMAINS is empty; skipping DNS cleanup."
            exit 0
          fi

          while IFS= read -r CUSTOM_HOSTNAME; do
            [ -n "${CUSTOM_HOSTNAME}" ] || continue

            ZONE_ID="$(find_zone_id "${CUSTOM_HOSTNAME}" || true)"
            if [ -z "${ZONE_ID}" ]; then
              echo "Cloudflare zone not accessible for ${CUSTOM_HOSTNAME}; skipping DNS cleanup for this hostname."
              continue
            fi

            RECORDS_RESPONSE="$(curl -sS -w $'\n%{http_code}' \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${API}/zones/${ZONE_ID}/dns_records?name=${CUSTOM_HOSTNAME}&per_page=100")"
            RECORDS="${RECORDS_RESPONSE%$'\n'*}"
            RECORDS_CODE="${RECORDS_RESPONSE##*$'\n'}"

            if [ "${RECORDS_CODE}" != "200" ]; then
              echo "Cannot list DNS records for ${CUSTOM_HOSTNAME}; skipping DNS cleanup for this hostname. HTTP ${RECORDS_CODE}."
              jq '{ errors, messages }' <<< "${RECORDS}" || true
              continue
            fi

            CONFLICTS="$(CUSTOM_HOSTNAME="${CUSTOM_HOSTNAME}" jq -r '
              .result[]
              | select(.name == env.CUSTOM_HOSTNAME and (.type == "A" or .type == "AAAA" or .type == "CNAME") and .content != "100::" and (.content | startswith("192.0.2.") | not))
              | [.id, .type, .content]
              | @tsv
            ' <<< "${RECORDS}")"

            if [ -z "${CONFLICTS}" ]; then
              echo "No conflicting DNS records found for ${CUSTOM_HOSTNAME}."
              continue
            fi

            while IFS=$'\t' read -r RECORD_ID RECORD_TYPE RECORD_CONTENT; do
              [ -n "${RECORD_ID}" ] || continue
              echo "Deleting ${RECORD_TYPE} ${CUSTOM_HOSTNAME} -> ${RECORD_CONTENT}"
              DELETE_RESULT="$(curl -sS -w $'\n%{http_code}' -X DELETE \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                "${API}/zones/${ZONE_ID}/dns_records/${RECORD_ID}")"
              DELETE_BODY="${DELETE_RESULT%$'\n'*}"
              DELETE_CODE="${DELETE_RESULT##*$'\n'}"

              if [ "${DELETE_CODE}" != "200" ]; then
                echo "Warning: delete returned HTTP ${DELETE_CODE} for ${RECORD_TYPE} ${CUSTOM_HOSTNAME}."
                jq '{ errors, messages }' <<< "${DELETE_BODY}" || true
              fi
            done <<< "${CONFLICTS}"

            REMAINING="$(curl -fsS \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${API}/zones/${ZONE_ID}/dns_records?name=${CUSTOM_HOSTNAME}&per_page=100")"

            STILL_CONFLICTING="$(CUSTOM_HOSTNAME="${CUSTOM_HOSTNAME}" jq -r '
              .result[]
              | select(.name == env.CUSTOM_HOSTNAME and (.type == "A" or .type == "AAAA" or .type == "CNAME") and .content != "100::" and (.content | startswith("192.0.2.") | not))
              | [.id, .type, .content]
              | @tsv
            ' <<< "${REMAINING}")"

            if [ -n "${STILL_CONFLICTING}" ]; then
              echo "Residual conflicting DNS records remain for ${CUSTOM_HOSTNAME}:"
              printf '%s\n' "${STILL_CONFLICTING}"
              exit 1
            fi
          done <<< "${CUSTOM_DOMAIN_LIST}"

      - name: ⚙ 设置 pnpm / Set up pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 9

      - name: ⚙ 设置 Node.js / Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "./mail-worker/pnpm-lock.yaml"

      - name: 📦 安装依赖 / Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./mail-worker

      - name: 📡 禁用 Wrangler 遥测 / Disable wrangler telemetry
        working-directory: ./mail-worker
        run: pnpm wrangler telemetry disable

      - name: 🛠️ 设置环境 / Set up environment
        working-directory: ./mail-worker
        run: |
          
          echo "🔐 Starting environment setup..."
          
          if [ -z "$JWT_SECRET" ] || grep -q '[?%#/\\]' <<< "$JWT_SECRET"; then
            echo "❌ JWT_SECRET variable is empty or contains invalid characters (?, %, #, /, \\)."
            exit 1
          fi
          
          if ! jq -e 'type == "array"' <<< "$DOMAIN" ; then
            echo "❌ DOMAIN variable must be a JSON array (e.g., [\"example.com\"])."
            exit 1
          fi
          
          if [ -z "$ADMIN" ]; then
            echo "❌ ADMIN variable cannot be empty."
            exit 1
          fi
          
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID variable cannot be empty."
            exit 1
          fi
          
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN variable cannot be empty."
            exit 1
          fi
          
          if [ -z "${CUSTOM_DOMAIN_LIST}" ]; then
            echo "::warning:: CUSTOM_DOMAINS variable is not set."
          fi
          
          CONFIG_FILE="wrangler-action.toml"
          
          if [ -z "$R2_BUCKET_NAME" ]; then
            sed -i '/\[\[r2_buckets\]\]/,/^$/d' "$CONFIG_FILE"
          fi
          
          if [ -z "$PROJECT_LINK" ]; then
            sed -i '/^project_link = /d' "$CONFIG_FILE"
          fi
          
          if [ -z "$LINUXDO_CLIENT_ID" ] || [ -z "$LINUXDO_CLIENT_SECRET" ]; then
            sed -i '/^linuxdo_client_id = /,/^linuxdo_switch = /d' "$CONFIG_FILE"
          fi
          
          CUSTOM_DOMAIN_ROUTES=""
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.setup_custom_domains == 'true' }}" = "true" ]; then
            while IFS= read -r CUSTOM_HOSTNAME; do
              [ -n "${CUSTOM_HOSTNAME}" ] || continue
              CUSTOM_DOMAIN_ROUTES="${CUSTOM_DOMAIN_ROUTES}[[routes]]
          pattern = \"${CUSTOM_HOSTNAME}\"
          custom_domain = true

          "
            done <<< "${CUSTOM_DOMAIN_LIST}"
          fi
          
          if [ "$(printf '%s' "$CLOUDFLARE_EMAIL" | tr '[:upper:]' '[:lower:]')" = "true" ]; then
            cat >> "$CONFIG_FILE" <<'EOF'

          [[send_email]]
          name = "email"
          EOF
          fi

          sed -i "s|\${NAME}|${NAME}|g" "$CONFIG_FILE"
          CUSTOM_DOMAIN_ROUTES="${CUSTOM_DOMAIN_ROUTES}" perl -0pi -e 's/\$\{CUSTOM_DOMAIN_ROUTES\}/$ENV{CUSTOM_DOMAIN_ROUTES}/g' "$CONFIG_FILE"
          sed -i "s|\"\${DOMAIN}\"|${DOMAIN}|g" "$CONFIG_FILE"
          sed -i "s|\${ADMIN}|${ADMIN}|g" "$CONFIG_FILE"
          sed -i "s|\${JWT_SECRET}|${JWT_SECRET}|g" "$CONFIG_FILE"
          sed -i "s|\${R2_BUCKET_NAME}|${R2_BUCKET_NAME}|g" "$CONFIG_FILE"
          sed -i "s|\${PROJECT_LINK}|${PROJECT_LINK}|g" "$CONFIG_FILE"
          sed -i "s|\${ANALYSIS_CACHE}|${ANALYSIS_CACHE}|g" "$CONFIG_FILE"
          sed -i "s|\${AI_MODEL}|${AI_MODEL}|g" "$CONFIG_FILE"
          sed -i "s|\${LINUXDO_CLIENT_ID}|${LINUXDO_CLIENT_ID}|g" "$CONFIG_FILE"
          sed -i "s|\${LINUXDO_CLIENT_SECRET}|${LINUXDO_CLIENT_SECRET}|g" "$CONFIG_FILE"
          sed -i "s|\${LINUXDO_CALLBACK_URL}|${LINUXDO_CALLBACK_URL}|g" "$CONFIG_FILE"
          sed -i "s|\${LINUXDO_SWITCH}|${LINUXDO_SWITCH}|g" "$CONFIG_FILE"
          
          echo "✅ Environment setup completed."

      - name: ⚡ 设置KV数据库 / Set up KV database
        working-directory: ./mail-worker
        run: |
          
          CONFIG_FILE="wrangler-action.toml"
          
          if [ -n "$KV_NAMESPACE_ID" ]; then
            sed -i "s|\${KV_NAMESPACE_ID}|${KV_NAMESPACE_ID}|g" "$CONFIG_FILE"
            echo "✅ Using the database from environment variables."
            exit 0
          fi
          
          echo "🔍 Checking if the database exists..."
          
          set +e
            KV_LIST=$(pnpm wrangler kv namespace list 2>&1)
            STATUS=$?
          set -e
          
          if [ $STATUS -ne 0 ]; then
            echo "$KV_LIST"
            exit 1
          fi
                  
          if echo "$KV_LIST" | jq -e ".[] | select(.title == \"$NAME\")" >/dev/null; then
            echo "✅ Database $NAME already exists."
            KV_ID=$(echo "$KV_LIST" | jq -r ".[] | select(.title == \"$NAME\") | .id")
            echo "KV_NAMESPACE_ID: $KV_ID"
          else
            echo "⚠️ Database $NAME does not exist. Starting creation..."
            pnpm wrangler kv namespace create $NAME
            KV_LIST=$(pnpm wrangler kv namespace list)
            KV_ID=$(echo "$KV_LIST" | jq -r ".[] | select(.title == \"$NAME\") | .id")
          fi
          
          sed -i "s|\${KV_NAMESPACE_ID}|$KV_ID|g" "$CONFIG_FILE"
          echo "✅ Setup completed."

      - name: 🐬 设置D1数据库 / Set up D1 database
        working-directory: ./mail-worker
        run: |
          
          CONFIG_FILE="wrangler-action.toml"
          
          if [ -n "$D1_DATABASE_ID" ]; then
            sed -i "s|\${D1_DATABASE_ID}|${D1_DATABASE_ID}|g" "$CONFIG_FILE"
            echo "✅ Using the database from environment variables."
            exit 0
          fi
          
          echo "🔍 Checking if the database exists..."
          
          set +e
            DB_LIST=$(pnpm wrangler d1 list --json 2>&1)
            STATUS=$?
          set -e
          
          if [ $STATUS -ne 0 ]; then
            echo "$DB_LIST"
            exit 1
          fi
          
          if echo "$DB_LIST" | jq -e ".[] | select(.name == \"$NAME\")" >/dev/null; then
            echo "✅ Database $NAME already exists."
            D1_ID=$(echo "$DB_LIST" | jq -r ".[] | select(.name == \"$NAME\") | .uuid")
            echo "D1_DATABASE_ID: $D1_ID"
          else
            echo "⚠️ Database $NAME does not exist. Starting creation..."
            pnpm wrangler d1 create $NAME
            DB_LIST=$(pnpm wrangler d1 list --json)
            D1_ID=$(echo "$DB_LIST" | jq -r ".[] | select(.name == \"$NAME\") | .uuid")
          fi
          
          sed -i "s|\${D1_DATABASE_ID}|$D1_ID|g" "$CONFIG_FILE"
          echo "✅ Setup completed."

      - name: 🚀 开始部署 / Start deployment
        id: deploy
        working-directory: ./mail-worker
        run: |
          echo "🚀 Starting deployment..."
          pnpm wrangler deploy -c wrangler-action.toml 2>&1 \
            | tee deploy.log \
            | grep -v "https://.*\.workers\.dev" \
            | sed -E 's/env\.domain .*/env.domain (***)/' \
            || true
          
          DEPLOY_EXIT_CODE=${PIPESTATUS[0]}
          if [ $DEPLOY_EXIT_CODE -ne 0 ]; then
            exit 1
          fi
          
          WORKER_URL=$(grep -o "https://.*\.workers\.dev" deploy.log || echo "")
          
          if [ -n "$WORKER_URL" ]; then
            echo "::add-mask::$WORKER_URL"
          fi
          
          echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT
          echo "✅ Setup completed."

      - name: 📬 邮箱路由已手动配置 / Email Routing already configured
        run: |
          echo "Cloudflare Email Routing is already configured in the dashboard for ${CUSTOM_DOMAINS:-${CUSTOM_DOMAIN:-this domain}}."
          echo "Skipping API setup to avoid requiring extra routing permissions on the deploy token."

      - name: 📬 配置邮箱路由 / Configure Email Routing
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.setup_email_routing == 'true' }}
        env:
          EMAIL_ZONE_NAME: ${{ inputs.email_zone_name }}
          EMAIL_DOMAIN: ${{ inputs.email_domain }}
        run: |
          set -euo pipefail

          API="https://api.cloudflare.com/client/v4"
          ZONE_NAME="${EMAIL_ZONE_NAME:-}"
          MAIL_DOMAIN="${EMAIL_DOMAIN:-}"

          if [ -z "$ZONE_NAME" ] || [ -z "$MAIL_DOMAIN" ]; then
            echo "❌ email_zone_name and email_domain are required."
            exit 1
          fi

          ZONE_RESPONSE="$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/zones?name=${ZONE_NAME}&per_page=1")"
          ZONE_ID="$(jq -r '.result[0].id // empty' <<< "$ZONE_RESPONSE")"

          if [ -z "$ZONE_ID" ]; then
            echo "❌ Cloudflare zone not found: ${ZONE_NAME}"
            jq '{success, errors, messages}' <<< "$ZONE_RESPONSE" || true
            exit 1
          fi

          echo "Zone: ${ZONE_NAME}"
          echo "Email domain: ${MAIL_DOMAIN}"

          DNS_BODY_INPUT="$(jq -n --arg name "$MAIL_DOMAIN" '{name: $name}')"
          DNS_RESPONSE="$(curl -sS -w $'\n%{http_code}' -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$DNS_BODY_INPUT" \
            "${API}/zones/${ZONE_ID}/email/routing/dns")"
          DNS_BODY="${DNS_RESPONSE%$'\n'*}"
          DNS_CODE="${DNS_RESPONSE##*$'\n'}"
          echo "Email Routing DNS status: ${DNS_CODE}"
          jq '{success, errors, messages, result}' <<< "$DNS_BODY" || true

          if [ "$DNS_CODE" != "200" ] && [ "$DNS_CODE" != "201" ]; then
            echo "❌ Failed to configure Email Routing DNS."
            exit 1
          fi

          CATCH_ALL_BODY="$(jq -n \
            --arg domain "$MAIL_DOMAIN" \
            --arg worker "$NAME" \
            '{
              enabled: true,
              matchers: [
                {
                  type: "all"
                }
              ],
              actions: [
                {
                  type: "worker",
                  value: [$worker]
                }
              ],
              name: ("catch-all to " + $worker + " for " + $domain)
            }')"

          CATCH_ALL_RESPONSE="$(curl -sS -w $'\n%{http_code}' -X PUT \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$CATCH_ALL_BODY" \
            "${API}/zones/${ZONE_ID}/email/routing/rules/catch_all")"
          CATCH_ALL_RESULT="${CATCH_ALL_RESPONSE%$'\n'*}"
          CATCH_ALL_CODE="${CATCH_ALL_RESPONSE##*$'\n'}"
          echo "Catch-all status: ${CATCH_ALL_CODE}"
          jq '{success, errors, messages, result: {enabled: .result.enabled, name: .result.name, tag: .result.tag, actions: .result.actions}}' <<< "$CATCH_ALL_RESULT" || true

          if [ "$CATCH_ALL_CODE" != "200" ] && [ "$CATCH_ALL_CODE" != "201" ]; then
            echo "❌ Failed to configure catch-all routing."
            exit 1
          fi

      - name: ♻️ 初始化数据库 / Initialize database
        run: |
          echo "🛠️ Starting database initialization..."
          sleep 15
          
          WORKER_URL="${FIRST_CUSTOM_DOMAIN:+https://$FIRST_CUSTOM_DOMAIN}"
          WORKER_URL="${WORKER_URL:-${{ steps.deploy.outputs.worker_url }}}"
          
          if [ -z "$WORKER_URL" ]; then
            echo "❌ Preview URL not available. Please set CUSTOM_DOMAINS."
            exit 1
          fi
          
          HTTP_CODE=$(curl -sL -w "%{http_code}" -o response.txt "$WORKER_URL/api/init/${JWT_SECRET}")
          RESPONSE_BODY=$(cat response.txt)

          if [ "$RESPONSE_BODY" = "success" ]; then
            echo "✅ Setup completed."
          else
            echo "❌ Failed. HTTP: $HTTP_CODE, Response: $RESPONSE_BODY"
            exit 1
          fi

      - name: 🗑️ 删除运行记录 / Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        continue-on-error: true
        with:
          retain_days: '1'
          keep_minimum_runs: '0'
