name: Repair cloud-mail admin account

on:
  workflow_dispatch:
    inputs:
      old_admin:
        description: Existing admin login email
        required: true
        default: admin@edu.ghibli1024.bond
      new_admin:
        description: New admin login email
        required: true
        default: admin@edu.ghibli1024.cyou

jobs:
  repair:
    name: Move admin login email
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
      OLD_ADMIN: ${{ inputs.old_admin }}
      NEW_ADMIN: ${{ inputs.new_admin }}

    steps:
      - name: Move admin login
        run: |
          set -euo pipefail

          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID D1_DATABASE_ID OLD_ADMIN NEW_ADMIN; do
            if [ -z "${!key:-}" ]; then
              echo "::error::${key} is required."
              exit 1
            fi
          done

          API="https://api.cloudflare.com/client/v4"

          run_sql() {
            local query="$1"
            local response body code
            response="$(curl -sS -w $'\n%{http_code}' -X POST \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$(jq -n --arg sql "${query}" '{sql: $sql}')" \
              "${API}/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${D1_DATABASE_ID}/query")"
            body="${response%$'\n'*}"
            code="${response##*$'\n'}"

            if [ "${code}" != "200" ]; then
              echo "::error::D1 query failed with HTTP ${code}."
              jq '{success, errors, messages}' <<< "${body}" || true
              exit 1
            fi

            printf '%s\n' "${body}"
          }

          old_user_response="$(run_sql "
            SELECT user_id, email, status, is_del
            FROM user
            WHERE lower(email) = lower('${OLD_ADMIN}');
          ")"
          old_user_count="$(jq '[.result[0].results[]?] | length' <<< "${old_user_response}")"

          if [ "${old_user_count}" -ne 1 ]; then
            echo "::error::Expected exactly one old admin user row for ${OLD_ADMIN}; found ${old_user_count}."
            jq '.result[0].results' <<< "${old_user_response}"
            exit 1
          fi

          old_user_id="$(jq -r '.result[0].results[0].user_id' <<< "${old_user_response}")"

          new_user_response="$(run_sql "
            SELECT user_id, email, status, is_del
            FROM user
            WHERE lower(email) = lower('${NEW_ADMIN}');
          ")"
          new_user_count="$(jq '[.result[0].results[]?] | length' <<< "${new_user_response}")"

          if [ "${new_user_count}" -gt 0 ]; then
            new_user_id="$(jq -r '.result[0].results[0].user_id' <<< "${new_user_response}")"
            if [ "${new_user_id}" != "${old_user_id}" ]; then
              echo "::error::New admin email already belongs to a different user_id=${new_user_id}."
              exit 1
            fi
          fi

          new_account_response="$(run_sql "
            SELECT account_id, email, user_id, status, is_del
            FROM account
            WHERE lower(email) = lower('${NEW_ADMIN}');
          ")"
          new_account_count="$(jq '[.result[0].results[]?] | length' <<< "${new_account_response}")"

          if [ "${new_account_count}" -lt 1 ]; then
            run_sql "
              INSERT INTO account (email, name, user_id)
              VALUES ('${NEW_ADMIN}', 'admin', ${old_user_id});
            " >/dev/null
          else
            run_sql "
              UPDATE account
              SET user_id = ${old_user_id}, is_del = 0
              WHERE lower(email) = lower('${NEW_ADMIN}');
            " >/dev/null
          fi

          run_sql "
            UPDATE user
            SET email = '${NEW_ADMIN}'
            WHERE user_id = ${old_user_id}
              AND lower(email) = lower('${OLD_ADMIN}');
          " >/dev/null

          echo "Admin user after repair:"
          run_sql "
            SELECT user_id, email, status, is_del
            FROM user
            WHERE user_id = ${old_user_id};
          " | jq -r '.result[0].results[] | [.user_id, .email, .status, .is_del] | @tsv'

          echo "Admin accounts after repair:"
          run_sql "
            SELECT account_id, email, user_id, status, is_del
            FROM account
            WHERE user_id = ${old_user_id}
              AND lower(email) IN (lower('${OLD_ADMIN}'), lower('${NEW_ADMIN}'))
            ORDER BY account_id;
          " | jq -r '.result[0].results[] | [.account_id, .email, .user_id, .status, .is_del] | @tsv'
